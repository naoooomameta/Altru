name: Fetch Clarity Data

on:
  schedule:
    # Daily at 03:00 JST (18:00 UTC the previous day)
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch Clarity data
        env:
          CLARITY_API_TOKEN: ${{ secrets.CLARITY_API_TOKEN }}
          CLARITY_NUM_DAYS: '1'
        run: node scripts/fetch-clarity-data.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/clarity
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update Clarity daily snapshot"
            git push
          fi
