<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お申し込みありがとうございました｜Altru</title>
<meta name="description" content="Altru へのお申し込みありがとうございました。">
<meta name="robots" content="noindex">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
  :root {
    --paper: #D9D2C8;
    --paper-soft: #E5DFD6;
    --paper-warm: #C9C0B2;
    --ink: #2C2826;
    --ink-soft: rgba(44, 40, 38, 0.72);
    --ink-mute: rgba(44, 40, 38, 0.55);
    --ink-line: rgba(44, 40, 38, 0.18);
    --accent: #8A7553;
    --serif: 'Noto Serif JP', 'Shippori Mincho', 'Yu Mincho', 'YuMincho', serif;
    --sans: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
    --serif-it: 'Cormorant Garamond', 'Times New Roman', serif;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    font-family: var(--sans);
    line-height: 1.85;
    -webkit-font-smoothing: antialiased;
  }

  .tx-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.1rem 1.5rem;
    border-bottom: 1px solid var(--ink-line);
  }
  .tx-header__logo {
    font-family: var(--serif-it);
    font-style: italic;
    font-size: 1.55rem;
    color: var(--ink);
    text-decoration: none;
    letter-spacing: 0.04em;
  }
  .tx-header__back {
    font-family: var(--serif-it);
    font-style: italic;
    font-size: 0.85rem;
    color: var(--ink-mute);
    text-decoration: none;
    letter-spacing: 0.1em;
    transition: color .2s;
  }
  .tx-header__back:hover { color: var(--ink); }

  .tx-main {
    max-width: 640px;
    margin: 0 auto;
    padding: 5rem 1.5rem 4rem;
    text-align: center;
  }

  .tx-mark {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--paper);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2rem;
    font-size: 2rem;
    font-family: var(--serif);
  }

  .tx-eyebrow {
    font-family: var(--serif-it);
    font-style: italic;
    font-size: 0.9rem;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.85rem;
  }

  .tx-title {
    font-family: var(--serif);
    font-size: clamp(2rem, 5vw, 2.75rem);
    font-weight: 500;
    letter-spacing: 0.06em;
    margin: 0 0 0.5rem;
    line-height: 1.5;
  }
  .tx-title em {
    font-family: var(--serif-it);
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }

  .tx-subtitle {
    font-family: var(--serif);
    font-size: 1.05rem;
    font-weight: 400;
    color: var(--ink-soft);
    margin: 0 0 2.5rem;
    letter-spacing: 0.04em;
  }

  .tx-card {
    background: var(--paper-soft);
    border: 1px solid var(--ink-line);
    border-radius: 4px;
    padding: 2rem 1.75rem;
    margin: 0 auto 2rem;
    text-align: left;
    max-width: 540px;
  }
  .tx-card__title {
    font-family: var(--serif);
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    margin: 0 0 1rem;
    padding-bottom: 0.85rem;
    border-bottom: 1px solid var(--ink-line);
    color: var(--ink);
  }
  .tx-card__list {
    margin: 0;
    padding: 0;
    list-style: none;
  }
  .tx-card__list li {
    position: relative;
    padding-left: 1.5rem;
    margin-bottom: 0.85rem;
    color: var(--ink-soft);
    font-size: 0.92rem;
    line-height: 1.8;
  }
  .tx-card__list li:last-child { margin-bottom: 0; }
  .tx-card__list li::before {
    content: "✦";
    position: absolute;
    left: 0;
    top: 0;
    color: var(--accent);
    font-size: 0.85rem;
  }
  .tx-card__list a {
    color: var(--accent);
    text-decoration: underline;
  }

  .tx-back-btn {
    display: inline-block;
    background: var(--ink);
    color: var(--paper);
    padding: 0.95rem 2.25rem;
    font-family: var(--serif);
    font-size: 0.95rem;
    letter-spacing: 0.12em;
    text-decoration: none;
    border-radius: 3px;
    transition: background .2s, transform .15s;
  }
  .tx-back-btn:hover {
    background: #1A1614;
    transform: translateY(-1px);
  }

  .tx-session {
    margin-top: 3.5rem;
    font-size: 0.7rem;
    color: var(--ink-mute);
    letter-spacing: 0.05em;
    line-height: 1.6;
    word-break: break-all;
  }
  .tx-session__label {
    font-family: var(--serif-it);
    font-style: italic;
    letter-spacing: 0.1em;
    display: block;
    margin-bottom: 0.25rem;
  }
  .tx-session__id {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    background: rgba(44, 40, 38, 0.06);
    padding: 0.2rem 0.5rem;
    border-radius: 2px;
  }

  .tx-footer {
    text-align: center;
    padding: 2rem 1.5rem 3rem;
    border-top: 1px solid var(--ink-line);
    color: var(--ink-mute);
    font-size: 0.78rem;
  }
  .tx-footer a {
    color: var(--ink-soft);
    margin: 0 0.6rem;
    text-decoration: none;
  }
  .tx-footer a:hover { color: var(--ink); }
  .tx-footer__copy {
    font-family: var(--serif-it);
    font-style: italic;
    letter-spacing: 0.08em;
    margin-top: 1rem;
  }

  @media (max-width: 600px) {
    .tx-header { padding: 0.9rem 1.1rem; }
    .tx-header__logo { font-size: 1.35rem; }
    .tx-main { padding: 3rem 1.25rem 3rem; }
    .tx-card { padding: 1.5rem 1.25rem; }
  }
</style>
</head>
<body>

<header class="tx-header">
  <a href="index.html" class="tx-header__logo">Altru</a>
  <a href="index.html" class="tx-header__back">← トップに戻る</a>
</header>

<main class="tx-main">
  <div class="tx-mark" aria-hidden="true">✓</div>

  <div class="tx-eyebrow">— Thank You</div>
  <h1 class="tx-title">ありがとう<em>ございます</em></h1>
  <p class="tx-subtitle">お申し込みを受け付けました。</p>

  <div class="tx-card">
    <h2 class="tx-card__title">この後の流れ</h2>
    <ul class="tx-card__list">
      <li>ご登録のメールアドレスに、領収書をお送りしました。受信ボックスをご確認ください。</li>
      <li>商品の準備が整い次第、お届け予定日をメールでご案内します。</li>
      <li>ご不明な点は <a href="mailto:altru.inc.jp@gmail.com">altru.inc.jp@gmail.com</a> までご連絡ください。</li>
    </ul>
  </div>

  <a href="index.html" class="tx-back-btn">LP に戻る →</a>

  <div class="tx-session" id="txSession" hidden>
    <span class="tx-session__label">— Reference</span>
    <span class="tx-session__id" id="txSessionId"></span>
  </div>
</main>

<footer class="tx-footer">
  <div>
    <a href="legal.html?doc=terms">利用規約</a>
    <a href="legal.html?doc=privacy">プライバシーポリシー</a>
    <a href="legal.html?doc=tokushoho">特定商取引法に基づく表記</a>
  </div>
  <p class="tx-footer__copy">© 2026 Altru. All Rights Reserved.</p>
</footer>

<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var sessionId = params.get('session_id');
  if (sessionId && /^[A-Za-z0-9_]+$/.test(sessionId)) {
    var wrap = document.getElementById('txSession');
    document.getElementById('txSessionId').textContent = sessionId;
    wrap.hidden = false;
  }
})();
</script>

</body>
</html>
