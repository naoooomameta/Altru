<title>お申込内容について｜Altru</title>
<meta name="description" content="Altru のお申込内容、カード情報、お届けの停止などをこちらから整えていただけます。">

<style>
  :root {
    --paper:      #F4F2EC;
    --paper-2:    #EAE8E1;
    --ink:        #1A1612;
    --ink-soft:   rgba(26, 22, 18, 0.78);
    --ink-mute:   rgba(26, 22, 18, 0.55);
    --ink-faint:  rgba(26, 22, 18, 0.18);
    --line:       #D2CFC4;
    --line-soft:  #E2DFD7;
    --gold:       #C9A45A;
    --serif:      'Shippori Mincho', 'Yu Mincho', 'YuMincho', serif;
    --serif-it:   'Cormorant Garamond', 'Times New Roman', serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    font-family: var(--serif);
    line-height: 1.85;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  a { color: inherit; }

  .ac-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.4rem 2rem;
    border-bottom: 1px solid var(--line-soft);
  }
  .ac-header__logo {
    font-family: var(--serif-it);
    font-style: italic;
    font-size: 1.7rem;
    color: var(--ink);
    text-decoration: none;
    letter-spacing: 0.04em;
    line-height: 1;
  }
  .ac-header__back {
    font-family: var(--serif-it);
    font-style: italic;
    font-size: 0.85rem;
    color: var(--ink-mute);
    text-decoration: none;
    letter-spacing: 0.14em;
    transition: color 0.25s ease;
  }
  .ac-header__back:hover { color: var(--ink); }

  .ac-hero {
    text-align: center;
    padding: clamp(5.5rem, 10vw, 9rem) 1.5rem clamp(3rem, 6vw, 5rem);
    max-width: 720px;
    margin: 0 auto;
  }
  .ac-hero__ornament {
    display: block;
    font-family: var(--serif-it);
    font-style: italic;
    font-size: 1.6rem;
    color: var(--gold);
    line-height: 1;
    margin-bottom: clamp(2rem, 4vw, 3rem);
    letter-spacing: 0.4em;
    padding-left: 0.4em;
  }
  .ac-eyebrow {
    font-family: var(--serif-it);
    font-style: italic;
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 0.42em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 1.75rem;
    display: inline-flex;
    align-items: center;
    gap: 1.25rem;
  }
  .ac-eyebrow::before,
  .ac-eyebrow::after {
    content: "";
    width: 2.4rem;
    height: 1px;
    background: var(--gold);
    display: inline-block;
  }
  .ac-title {
    font-family: var(--serif);
    font-size: clamp(2.2rem, 5.5vw, 3.4rem);
    font-weight: 500;
    letter-spacing: 0.06em;
    line-height: 1.55;
    margin-bottom: clamp(1.5rem, 3vw, 2rem);
  }
  .ac-lead {
    font-size: 1.05rem;
    color: var(--ink-soft);
    line-height: 2.1;
    letter-spacing: 0.06em;
    max-width: 30em;
    margin: 0 auto;
  }

  .ac-rule {
    width: 1px;
    height: clamp(3rem, 6vw, 5rem);
    background: var(--line);
    margin: 0 auto;
  }

  .ac-items {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 1.5rem clamp(3rem, 6vw, 4rem);
  }
  .ac-item {
    border-top: 1px solid var(--line);
    padding: 1.6rem 0;
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
  }
  .ac-item:last-child {
    border-bottom: 1px solid var(--line);
  }
  .ac-item__num {
    font-family: var(--serif-it);
    font-style: italic;
    font-size: 1.1rem;
    color: var(--gold);
    letter-spacing: 0.08em;
    line-height: 1;
    flex-shrink: 0;
    min-width: 2.5rem;
  }
  .ac-item__body {
    font-family: var(--serif);
    font-size: 1rem;
    color: var(--ink-soft);
    line-height: 1.85;
    letter-spacing: 0.04em;
  }

  .ac-cta-wrap {
    text-align: center;
    padding: 0 1.5rem clamp(2.5rem, 5vw, 4rem);
  }
  .ac-cta {
    display: inline-flex;
    align-items: center;
    gap: 0.95rem;
    padding: 1.05rem 2.7rem;
    background: var(--ink);
    color: var(--paper);
    font-family: var(--serif);
    font-size: 0.92rem;
    letter-spacing: 0.2em;
    text-decoration: none;
    border: 1px solid var(--ink);
    transition: background 0.3s ease, color 0.3s ease;
  }
  .ac-cta:hover {
    background: var(--paper);
    color: var(--ink);
  }
  .ac-cta__arrow {
    font-family: var(--serif-it);
    font-style: italic;
  }

  .ac-note {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 1.5rem clamp(4rem, 8vw, 6rem);
    text-align: center;
  }
  .ac-note__text {
    font-size: 0.92rem;
    color: var(--ink-mute);
    line-height: 1.95;
    letter-spacing: 0.04em;
  }
  .ac-note__text a {
    color: var(--ink-soft);
    border-bottom: 1px solid var(--ink-faint);
    text-decoration: none;
    transition: border-color 0.25s ease;
  }
  .ac-note__text a:hover { border-color: var(--ink); }

  .ac-footer {
    text-align: center;
    padding: 2.5rem 1.5rem 3rem;
    border-top: 1px solid var(--line-soft);
    color: var(--ink-mute);
    font-size: 0.78rem;
    letter-spacing: 0.06em;
  }
  .ac-footer__nav a {
    color: var(--ink-mute);
    margin: 0 0.85rem;
    text-decoration: none;
    transition: color 0.25s ease;
  }
  .ac-footer__nav a:hover { color: var(--ink); }
  .ac-footer__copy {
    font-family: var(--serif-it);
    font-style: italic;
    letter-spacing: 0.14em;
    margin-top: 1.1rem;
    color: var(--ink-mute);
  }

  @media (max-width: 768px) {
    .ac-header { padding: 1rem 1.25rem; }
    .ac-header__logo { font-size: 1.45rem; }
    .ac-header__back { font-size: 0.78rem; letter-spacing: 0.1em; }
    .ac-hero { padding: 3.5rem 1.25rem 2.5rem; }
    .ac-eyebrow { font-size: 0.92rem; letter-spacing: 0.32em; gap: 0.85rem; }
    .ac-eyebrow::before, .ac-eyebrow::after { width: 1.6rem; }
    .ac-lead { font-size: 0.95rem; line-height: 2; letter-spacing: 0.04em; }
    .ac-item { padding: 1.25rem 0; gap: 1rem; }
    .ac-item__body { font-size: 0.92rem; }
    .ac-cta { padding: 0.95rem 2rem; font-size: 0.85rem; letter-spacing: 0.16em; }
    .ac-note__text { font-size: 0.86rem; }
    .ac-footer__nav a { display: inline-block; margin: 0.25rem 0.6rem; }
  }
</style>
