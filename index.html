ice__small { font-size: 0.75rem; color: var(--ink-mute); line-height: 2; letter-spacing: 0.04em; }\n\n/* ============ STORY ============ */\n.story { border-top: 1px solid var(--line); }\n.story__grid {\n  display: grid; grid-template-columns: 5fr 7fr;\n  gap: clamp(2rem, 5vw, 5rem); align-items: start;\n}\n.story__visual { position: sticky; top: calc(var(--nav-h) + 2rem); }\n.story__visual-inner {\n  aspect-ratio: 4/5;\n  position: relative;\n}\n.story__body {\n  font-family: 'Shippori Mincho', serif;\n  font-size: 0.95rem; color: var(--ink-soft);\n  line-height: 2.3;\n  display: flex; flex-direction: column; gap: 1.5rem;\n}\n.story__body p { max-width: 32em; }\n.story__body strong { color: var(--ink); font-weight: 600; }\n.story__body em { font-family: 'Cormorant Garamond', serif; color: var(--gold); font-size: 1.05em; }\n.story__sig {\n  margin-top: 2rem;\n  font-family: 'Cormorant Garamond', serif;\n  font-style: italic;\n  color: var(--gold);\n  letter-spacing: 0.1em;\n  font-size: 1.15rem;\n}\n\n/* ============ FAQ ============ */\n.faq { background: var(--bg-1); border-top: 1px solid var(--line); }\n.faq__head { text-align:center; margin-bottom: 3rem; }\n.faq__list { max-width: 760px; margin: 0 auto; }\n.faq__item { border-top: 1px solid var(--line); }\n.faq__item:last-child { border-bottom: 1px solid var(--line); }\ndetails > summary { list-style: none; cursor: pointer; }\ndetails > summary::-webkit-details-marker { display: none; }\n.faq__summary {\n  display: flex; align-items: flex-start; justify-content: space-between;\n  gap: 1.5rem; padding: 1.85rem 0;\n  transition: padding-left .3s;\n}\n.faq__item:hover .faq__summary { padding-left: 0.5rem; }\n.faq__q {\n  font-family: 'Shippori Mincho', serif;\n  font-size: 1rem; color: var(--ink);\n  line-height: 1.7;\n  display: flex; gap: 1rem; align-items: baseline;\n}\n.faq__qnum {\n  font-family: 'Cormorant Garamond', serif;\n  font-style: italic;\n  color: var(--gold);\n  flex-shrink: 0;\n  font-size: 0.95rem ar(--line);\n  border-radius: 999px;\n}\n.cta-section__dot {\n  width: 7px; height: 7px; border-radius: 50%;\n  background: var(--gold);\n  box-shadow: 0 0 0 0 var(--gold);\n  animation: pulse 2.4s ease-in-out infinite;\n}\n@keyframes pulse {\n  0%,100% { box-shadow: 0 0 0 0 rgba(201,164,90,0.5); }\n  50% { box-shadow: 0 0 0 8px rgba(201,164,90,0); }\n}\n.cta-section__count { color: var(--gold); font-weight: 500; }\n.cta-box {\n  background: var(--bg-1);\n  border: 1px solid var(--line);\n  padding: clamp(1.75rem, 3vw, 2.5rem);\n  max-width: 540px; margin: 0 auto;\n  position: relative;\n}\n.cta-box::before {\n  content:''; position:absolute; top:0; left:0; right:0; height:1px;\n  background: linear-gradient(90deg, transparent, var(--gold), transparent);\n}\n.cta-box__row { display:flex; gap: 0.6rem; margin-bottom: 1rem; }\n.cta-box__input {\n  flex:1; padding: 0.95rem 1rem;\n  background: var(--bg); border: 1px solid var(--line);\n  font-size: 0.86rem; color: var(--ink);\n  outline: none; transition: border-color .25s;\n  min-width: 0;\n}\n.cta-box__input::placeholder { color: var(--ink-mute); }\n.cta-box__input:focus { border-color: var(--gold); }\n.cta-box__submit {\n  background: var(--gold); color: var(--bg);\n  border: none; cursor: pointer;\n  padding: 0.95rem 1.5rem;\n  font-family: 'Shippori Mincho', serif;\n  font-size: 0.82rem; letter-spacing: 0.08em;\n  white-space: nowrap; font-weight: 600;\n  transition: background .3s, transform .3s;\n}\n.cta-box__submit:hover { background: var(--gold-soft); transform: translateY(-1px); }\n.cta-box__divider {\n  display: flex; align-items: center; gap: 1rem; margin: 1.25rem 0;\n}\n.cta-box__divider-line { flex:1; height:1px; background: var(--line); }\n.cta-box__divider-text {\n  font-family: 'Cormorant Garamond', serif; font-style: italic;\n  font-size: 0.78rem; color: var(--ink-mute); letter-spacing: 0.25em;\n}\n.cta-box__line {\n  width: 100%; padding: 0.95rem;\n  background: #06C755; color: white; border: none; cursor: pointer;\n  font-family: 'Shippori Mincho', serif;\n  font-size: 0.85rem; letter-spacing: 0.08em;\n  font-weight: 600;\n  transition: opacity .25s, transform .25s;\n}\n.cta-box__line:hover { opacity: 0.9; transform: translateY(-1px); }\n.cta-box__fine {\n  font-size: 0.72rem; color: var(--ink-mute);\n  margin-top: 0.85rem;\n  letter-spacing: 0.04em;\n}\n.cta-section__fine {\n  font-size: 0.72rem; color: var(--ink-mute);\n  margin-top: 2rem; letter-spacing: 0.05em;\n}\n\n.cta-success { display: none; flex-direction: column; align-items: center; gap: 1rem; padding: 2rem; text-align: center; }\n.cta-success__icon { width: 52px; height: 52px; border-radius: 50%; background: var(--gold); color: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }\n.cta-success__title { font-family: 'Shippori Mincho', serif; font-size: 1.15rem; }\n.cta-success__body { font-size: 0.84rem; color: var(--ink-soft); line-height: 2; }\n\n/* ============ FOOTER ============ */\n.footer {\n  background: var(--bg);\n  border-top: 1px solid var(--line);\n  padding: 4rem 0 3rem;\n}\n.footer__inner {\n  display: grid;\n  grid-template-columns: 2fr 1fr;\n  gap: 2rem; align-items: end;\n}\n.footer__brand-block { display: flex; flex-direction: column; gap: 1rem; }\n.footer__brand .logo { font-size: 1.85rem; }\n.footer__tag {\n  font-family: 'Shippori Mincho', serif;\n  font-size: 0.85rem; color: var(--ink-soft);\n  line-height: 2;\n  max-width: 28em;\n}\n.footer__meta {\n  display: flex; flex-direction: column; gap: 0.6rem;\n  align-items: flex-end;\n  font-size: 0.72rem; color: var(--ink-mute); letter-spacing: 0.1em;\n  text-align: right;\n}\n.footer__motto {\n  font-family: 'Cormorant Garamond', serif;\n  font-style: italic; font-size: 1rem;\n  color: var(--gold);\n  letter-spacing: 0.1em;\n}\n\n/* ============ MOBILE STICKY ============ */\n.sticky-cta {\n  position: fixed; bottom: 0; left: 0; right: 0; z-index: 90;\n  background: rgba(10,9,7,0.96);\n  backdrop-filter: blur(20px);\n  border-top: 1px solid var(--line);\n  padding: 0.85rem clamp(1rem, 4vw, 1.5rem);\n  display: none; align-items: center; justify-content: space-between; gap: 1rem;\n  transform: translateY(100%);\n  transition: transform .4s cubic-bezier(.4,0,.2,1);\n}\n.sticky-cta.visible { transform: translateY(0); }\n.sticky-cta__text {\n  font-size: 0.78rem; letter-spacing: 0.04em;\n  font-family: 'Shippori Mincho', serif;\n}\n.sticky-cta__btn {\n  background: var(--gold); color: var(--bg); border:none; cursor:pointer;\n  padding: 0.65rem 1.2rem; font-size: 0.78rem; letter-spacing: 0.08em;\n  white-space: nowrap; flex-shrink: 0; font-weight: 600;\n  font-family: 'Shippori Mincho', serif;\n}\n\n/* ============ PLACEHOLDERS ============ */\n.ph {\n  background: linear-gradient(135deg, #2A2118 0%, #1A1410 60%, #100C08 100%);\n  position: relative; overflow: hidden;\n  border: 1px solid rgba(201,164,90,0.15);\n}\n.ph::before {\n  content:''; position:absolute; inset:0;\n  background-image: repeating-linear-gradient(135deg, transparent 0, transparent 14px, rgba(201,164,90,0.04) 14px, rgba(201,164,90,0.04) 15px);\n}\n.ph__label {\n  position: absolute; inset: 0;\n  display: flex; flex-direction: column; align-items: center; justify-content: center;\n  gap: 0.5rem; padding: 1.25rem;\n  z-index: 1; text-align: center;\n}\n.ph__tag {\n  font-family: 'Cormorant Garamond', serif;\n  font-style: italic;\n  font-size: 0.85rem; letter-spacing: 0.18em;\n  color: rgba(201,164,90,0.6);\n}\n.ph__desc {\n  font-size: 0.75rem;\n  color: rgba(184,174,153,0.5);\n  line-height: 1.8;\n  max-width: 18em;\n}\n\n/* ============ RESPONSIVE ============ */\n@media (max-width: 1024px) {\n  .hero__inner { grid-template-columns: 1fr; }\n  .hero__visual { min-height: 50vw; }\n  .hero__copy::after { display: none; }\n  .features__header { grid-template-columns: 1fr; }\n  .voice__grid { grid-template-columns: 1fr; }\n  .story__grid { grid-template-columns: 1fr; }\n  .story__visual { position: static; }\n  .price__panel.active { grid-template-columns: 1fr; }\n  .footer__inner { grid-template-columns: 1fr; }\n  .footer__meta { align-items: flex-start; text-align: left; }\n}\n@media (max-width: 768px) {\n  .nav__links, .nav__cta { display: none; }\n  .nav__burger { display: flex; }\n  .stats__grid { grid-template-columns: 1fr; }\n  .stats__item { border-right: none; border-bottom: 1px solid var(--line); }\n  .stats__item:last-child { border-bottom: none; }\n  .about__grid { grid-template-columns: 1fr; }\n  .steps__list { grid-template-columns: 1fr; gap: 2.5rem; }\n  .steps__list::before { display: none; }\n  .features__grid { grid-template-columns: 1fr; }\n  .scenes__grid { grid-template-columns: 1fr; }\n  .price__tabs { grid-template-columns: 1fr 1fr; }\n  .price__tab { border-bottom: 1px solid var(--line); }\n  .price__tab:nth-child(2n) { border-right: none; }\n  .price__tab:nth-last-child(-n+2) { border-bottom: none; }\n  .sticky-cta { display: flex; }\n  body { padding-bottom: 4.5rem; }\n  .hero-hl { font-size: clamp(1.5rem, 6vw, 3.5rem); word-break: keep-all; line-break: strict; }\n}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<!-- ============ NAV ============ -->\n<nav class=\"nav\" id=\"nav\">\n  <div class=\"container nav__inner\">\n    <a href=\"#top\" class=\"logo\">Altru<\u002Fa>\n    <ul class=\"nav__links\">\n      <li><a href=\"#about\">Concept<\u002Fa><\u002Fli>\n      <li><a href=\"#steps\">How<\u002Fa><\u002Fli>\n      <li><a href=\"#features\">Why<\u002Fa><\u002Fli>\n      <li><a href=\"#price\">Plan<\u002Fa><\u002Fli>\n      <li><a href=\"#faq\">FAQ<\u002Fa><\u002Fli>\n    <\u002Ful>\n    <a href=\"#cta\" class=\"nav__cta\">\n      <span class=\"nav__cta-dot\"><\u002Fspan>\n      <span>先行登録<\u002Fspan>\n    <\u002Fa>\n    <button class=\"nav__burger\" id=\"burger\" aria-label=\"メニュー\">\n      <span><\u002Fspan><span><\u002Fspan><span><\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fnav>\n<div class=\"mobile-menu\" id=\"mobileMenu\">\n  <a href=\"#about\" onclick=\"closeMobileMenu()\">Concept<\u002Fa>\n  <a href=\"#steps\" onclick=\"closeMobileMenu()\">How it works<\u002Fa>\n  <a href=\"#features\" onclick=\"closeMobileMenu()\">Why Altru<\u002Fa>\n  <a href=\"#price\" onclick=\"closeMobileMenu()\">Plan<\u002Fa>\n  <a href=\"#faq\" onclick=\"closeMobileMenu()\">FAQ<\u002Fa>\n  <a href=\"#cta\" class=\"mobile-menu__cta\" onclick=\"closeMobileMenu()\">先行登録する →<\u002Fa>\n<\u002Fdiv>\n\n<!-- ============ HERO ============ -->\n<section id=\"top\" class=\"hero\">\n  <div class=\"hero__grain\"><\u002Fdiv>\n  <div class=\"hero__bg-mark\">A<\u002Fdiv>\n  <div class=\"hero__inner\">\n    <div class=\"hero__copy\">\n      <div class=\"hero__top\">\n        <span class=\"hero__top-line\"><\u002Fspan>\n        <span class=\"hero__top-meta\">\n          <span class=\"f-display\">Est. 2026<\u002Fspan>\n          <span>—<\u002Fspan>\n          <span>Tokyo, Japan<\u002Fspan>\n        <\u002Fspan>\n      <\u002Fdiv>\n\n      <div>\n        <h1 class=\"hero-hl line-anim\">\n          <span class=\"line\"><span>花を絶やさない、<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span>それが<span class=\"accent\">できる男<\u002Fspan>の余裕。<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span><em>Some men just<\u002Fem> know how.<\u002Fspan><\u002Fspan>\n        <\u002Fh1>\n        <p class=\"hero-lede reveal reveal-d2\">\n          結局のところ、<strong>できる男は、続けている。<\u002Fstrong><br>\n          派手な記念日より、何でもない一日に。<br>\n          その小さな差が、長い時間で大きな差になる。\n        <\u002Fp>\n        <div class=\"hero__chips reveal reveal-d3\">\n          <span class=\"hero__chip\"><span class=\"hero__chip-mark\">✦<\u002Fspan>手配の手間ゼロ<\u002Fspan>\n          <span class=\"hero__chip\"><span class=\"hero__chip-mark\">✦<\u002Fspan>贈り忘れゼロ<\u002Fspan>\n          <span class=\"hero__chip\"><span class=\"hero__chip-mark\">✦<\u002Fspan>メッセージカード込<\u002Fspan>\n          <span class=\"hero__chip\"><span class=\"hero__chip-mark\">✦<\u002Fspan>税込・送料込<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"hero__cta-row reveal reveal-d4\">\n          <a href=\"#cta\" class=\"btn btn--primary\">\n            <span>先行登録リストに加わる<\u002Fspan>\n            <span class=\"arrow\">→<\u002Fspan>\n          <\u002Fa>\n          <p class=\"hero__note\">先着500名。サービス開始時に<br>初回特別ギフトをお届けします。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"hero__visual\">\n      <div class=\"hero__visual-inner\">\n        <div class=\"hero__visual-tag\">\n          <span>No. 001<\u002Fspan>\n          <span>Hero Image<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"hero__visual-mid\">\n          <svg width=\"42\" height=\"42\" viewBox=\"0 0 42 42\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1\">\n            <circle cx=\"21\" cy=\"13\" r=\"6\"><\u002Fcircle>\n            <circle cx=\"13\" cy=\"22\" r=\"6\"><\u002Fcircle>\n            <circle cx=\"29\" cy=\"22\" r=\"6\"><\u002Fcircle>\n            <circle cx=\"21\" cy=\"29\" r=\"6\"><\u002Fcircle>\n            <line x1=\"21\" y1=\"34\" x2=\"21\" y2=\"40\"><\u002Fline>\n          <\u002Fsvg>\n          <span>スーツ姿の男性の手元に<br>さりげなく花束とAltruのカード<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"hero__visual-foot\">\n          <span>Florist's Choice<\u002Fspan>\n          <span class=\"f-display\">— Spring Edit<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"hero__scroll\">\n    <span class=\"hero__scroll-line\"><\u002Fspan>\n    <span>Scroll<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ MARQUEE ============ -->\n<div class=\"marquee\">\n  <div class=\"marquee__track\">\n    <span>A Quiet Flex<\u002Fspan>\n    <span>絶やさない男の、静かな余裕<\u002Fspan>\n    <span>Some Men Just Know How<\u002Fspan>\n    <span>派手な記念日より、何でもない一日<\u002Fspan>\n    <span>The Habit of Effortless Men<\u002Fspan>\n    <span>続けることが、男の差になる<\u002Fspan>\n    <span>A Quiet Flex<\u002Fspan>\n    <span>絶やさない男の、静かな余裕<\u002Fspan>\n    <span>Some Men Just Know How<\u002Fspan>\n    <span>派手な記念日より、何でもない一日<\u002Fspan>\n    <span>The Habit of Effortless Men<\u002Fspan>\n    <span>続けることが、男の差になる<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ VOICES ECHO ============ -->\n<section class=\"voices-echo\">\n  <div class=\"container\">\n    <div class=\"voices-echo__head reveal\">\n      <div class=\"voices-echo__eye\">— What the women say.<\u002Fdiv>\n      <h2 class=\"voices-echo__hl\">\n        絶やさない男のもとには、<br>\n        こういう<em>言葉<\u002Fem>が返ってくる。\n      <\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"voices-echo__grid\">\n      <div class=\"voice-echo reveal\">\n        <div class=\"voice-echo__mark\">\"<\u002Fdiv>\n        <p class=\"voice-echo__text\">\n          記念日でもないのに、夫から花が届いて。それも、月に一度。「特別な日」じゃない日に贈られる花って、こんなに沁みるものなんですね。家のなかに花瓶があるだけで、毎日が少しずつ違って見えます。\n        <\u002Fp>\n        <div class=\"voice-echo__author\">\n          <span class=\"voice-echo__name\">Mio, 38 — 結婚10年目の妻<\u002Fspan>\n          <span class=\"voice-echo__meta\">Yokohama<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"voice-echo reveal reveal-d1\">\n        <div class=\"voice-echo__mark\">\"<\u002Fdiv>\n        <p class=\"voice-echo__text\">\n          誕生日に花をもらうのは嬉しい。でも、Altruで彼から届く花は何かが違うんです。「特別じゃない日に思い出してくれた」という事実そのものが、ものすごい贈り物だと、受け取って初めて気づきました。\n        <\u002Fp>\n        <div class=\"voice-echo__author\">\n          <span class=\"voice-echo__name\">Akiko, 34 — 同棲中の彼女<\u002Fspan>\n          <span class=\"voice-echo__meta\">Kyoto<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ KOAN ============ -->\n<section class=\"section koan\">\n  <div class=\"container--narrow\">\n    <div class=\"koan__head reveal\">\n      <div class=\"eyebrow-num\">— 02 / A familiar feeling<\u002Fdiv>\n      <h2 class=\"section-hl\" style=\"margin-top:1.5rem;\">\n        こんな日々に、<em>覚え<\u002Fem>はありませんか。\n      <\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"koan__lines\">\n      <p class=\"koan__line\"><em class=\"f-display\">\"Time slips away.\"<\u002Fem>　気づけば一週間が終わり、月が変わっている。<\u002Fp>\n      <p class=\"koan__line\"><em class=\"f-display\">\"Special occasions only.\"<\u002Fem>　記念日にだけ、思い出したように花を買う。<\u002Fp>\n      <p class=\"koan__line\"><em class=\"f-display\">\"What should I choose?\"<\u002Fem>　花屋に入っても、何が彼女の好みかわからない。<\u002Fp>\n      <p class=\"koan__line\">「思っているのに、できていない」——<br>そんな小さな心残りが、いつのまにか積もっていく。<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"koan__pivot reveal\">\n      <div class=\"hairline hairline--gold hairline--short\"><\u002Fdiv>\n      <span class=\"koan__pivot-mark\">— altruism —<\u002Fspan>\n      <p class=\"koan__pivot-text\">\n        Altruは、その<em class=\"f-display\">\"やれていない\"<\u002Fem>を、<br>\n        <strong>静かに肩代わりする仕組みです。<\u002Fstrong>\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ STATS ============ -->\n<section class=\"stats\">\n  <div class=\"container\">\n    <div class=\"stats__grid\">\n      <div class=\"stats__item reveal\">\n        <div class=\"stats__num\">\n          <span class=\"counter\" data-target=\"80\">0<\u002Fspan>\n          <span class=\"stats__num-unit\">%<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"stats__label\">あなたが思う以上に、\n花を贈られた記憶は長く残る。<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stats__item reveal reveal-d1\">\n        <div class=\"stats__num\">\n          <span class=\"counter\" data-target=\"2\">0<\u002Fspan>\n          <span class=\"stats__num-unit\">回 / 年<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"stats__label\">Altruがあなたの代わりに覚えている、<br>標準プランの年間お届け回数<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stats__item reveal reveal-d2\">\n        <div class=\"stats__num\">\n          <span class=\"stats__num-unit\" style=\"font-size:1.8rem;\">¥<\u002Fspan>\n          <span class=\"counter\" data-target=\"8000\">0<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"stats__label\">1回あたり。税込・送料込・<br>メッセージカード込<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ ABOUT ============ -->\n<section id=\"about\" class=\"section about\">\n  <div class=\"container--mid\">\n    <div class=\"about__head reveal\">\n      <div class=\"eyebrow-num\">— 03 / What is Altru<\u002Fdiv>\n      <h2 class=\"about__hl\">\n        Altruは、思いやりを<br><em>\"仕組み\"<\u002Fem>にする定期便です。\n      <\u002Fh2>\n      <p class=\"about__lede\">\n        登録しておけば、あとはAltruが覚えています。<br>\n        年に2回、季節の花と、あなたのメッセージカードを、あの人のもとへ。\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"about__grid\">\n      <div class=\"about__card reveal\">\n        <div class=\"about__media ph\">\n          <span class=\"about__media-num\">i.<\u002Fspan>\n          <span class=\"about__media-cap\">Auto Delivery<\u002Fspan>\n          <div class=\"ph__label\">\n            <span class=\"ph__tag\">Image 01<\u002Fspan>\n            <span class=\"ph__desc\">テーブルに置かれた季節の花束と、添えられたAltruのカード<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"about__body-wrap\">\n          <h3 class=\"about__title\">自動で届く<\u002Fh3>\n          <p class=\"about__body\">半年に1度、季節の花を厳選してお届け。日付も内容も、あなたが手を動かす必要はありません。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"about__card reveal reveal-d1\">\n        <div class=\"about__media ph\">\n          <span class=\"about__media-num\">ii.<\u002Fspan>\n          <span class=\"about__media-cap\">Designated Recipient<\u002Fspan>\n          <div class=\"ph__label\">\n            <span class=\"ph__tag\">Image 02<\u002Fspan>\n            <span class=\"ph__desc\">花束を受け取り、ふと微笑む女性の手元・後ろ姿<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"about__body-wrap\">\n          <h3 class=\"about__title\">あなたが指定した、あの人へ<\u002Fh3>\n          <p class=\"about__body\">妻、恋人、母、姉妹。届け先はあなたが選んだ一人。住所も連絡先も、Altruが安全に管理します。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"about__card reveal reveal-d2\">\n        <div class=\"about__media ph\">\n          <span class=\"about__media-num\">iii.<\u002Fspan>\n          <span class=\"about__media-cap\">Your Words<\u002Fspan>\n          <div class=\"ph__label\">\n            <span class=\"ph__tag\">Image 03<\u002Fspan>\n            <span class=\"ph__desc\">手書きのメッセージカードと万年筆、傍らに小さな花<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"about__body-wrap\">\n          <h3 class=\"about__title\">あなたの言葉を添えて<\u002Fh3>\n          <p class=\"about__body\">毎回のメッセージカードは、あなたの言葉で。「いつもありがとう」だけでも、花と一緒なら、十分に届きます。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ STEPS ============ -->\n<section id=\"steps\" class=\"section steps\">\n  <div class=\"container--mid\">\n    <div class=\"steps__head reveal\">\n      <div class=\"eyebrow-num\">— 04 / How it works<\u002Fdiv>\n      <h2 class=\"section-hl\" style=\"margin-top:1.5rem;\">\n        はじめ方は、たった<em>3ステップ。<\u002Fem>\n      <\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"steps__list\">\n      <div class=\"steps__item reveal\">\n        <div class=\"steps__media ph\">\n          <div class=\"steps__circle\">i<\u002Fdiv>\n          <span class=\"steps__media-cap\">Register<\u002Fspan>\n          <div class=\"ph__label\">\n            <span class=\"ph__tag\">Image 04<\u002Fspan>\n            <span class=\"ph__desc\">スマートフォンでLINE登録画面、住所と日付を入力する手元<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"steps__step-label\">Step 01<\u002Fdiv>\n        <h3 class=\"steps__title\">届け先と日付を登録<\u002Fh3>\n        <p class=\"steps__body\">大切な人の住所と、お届けしたい時期（誕生日・記念日など）を登録。LINEから5分で完了します。<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"steps__item reveal reveal-d1\">\n        <div class=\"steps__media ph\">\n          <div class=\"steps__circle\">ii<\u002Fdiv>\n          <span class=\"steps__media-cap\">Personalize<\u002Fspan>\n          <div class=\"ph__label\">\n            <span class=\"ph__tag\">Image 05<\u002Fspan>\n            <span class=\"ph__desc\">机の上で万年筆を握り、メッセージカードに一言を書き添える<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"steps__step-label\">Step 02<\u002Fdiv>\n        <h3 class=\"steps__title\">メッセージを一言添える<\u002Fh3>\n        <p class=\"steps__body\">お届けの1週間前にLINEでリマインド。一行のメッセージを入力するだけ。デフォルト文も用意。<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"steps__item reveal reveal-d2\">\n        <div class=\"steps__media ph\">\n          <div class=\"steps__circle\">iii<\u002Fdiv>\n          <span class=\"steps__media-cap\">Delivered<\u002Fspan>\n          <div class=\"ph__label\">\n            <span class=\"ph__tag\">Image 06<\u002Fspan>\n            <span class=\"ph__desc\">玄関先に届いた花束を受け取り、嬉しそうに微笑む女性<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"steps__step-label\">Step 03<\u002Fdiv>\n        <h3 class=\"steps__title\">あとは、Altruにおまかせ<\u002Fh3>\n        <p class=\"steps__body\">季節の花とメッセージカードが、あの人のもとへ届きます。あなたは何もしなくていい。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ MANIFESTO (kinetic) ============ -->\n<section class=\"manifesto\">\n  <div class=\"container--narrow\">\n    <div class=\"manifesto__pre\">— Manifesto —<\u002Fdiv>\n    <p class=\"manifesto__big\" id=\"manifestoBig\"><\u002Fp>\n    <div class=\"manifesto__sig\" style=\"gap: 20px; font-size: 20px;\">\n      <span class=\"manifesto__sig-line\"><\u002Fspan>\n      <span>Altru, 2026<\u002Fspan>\n      <span class=\"manifesto__sig-line\"><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FEATURES ============ -->\n<section id=\"features\" class=\"section features\">\n  <div class=\"container\">\n    <div class=\"features__header\">\n      <div class=\"reveal\">\n        <div class=\"eyebrow-num\" style=\"margin-bottom:1.5rem;\">— 05 / Why Altru<\u002Fdiv>\n        <h2 class=\"features__hl\">\n          花の定期便ではなく、<br>\n          忙しくても、<em>大切な人を大切にできる男<\u002Fem>のための定期便。\n        <\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"reveal reveal-d1\">\n        <p class=\"features__lede\">\n          花を売っているサービスは、たくさんあります。<br>\n          Altruが届けるのは、花ではなく、<br>\n          <em>\"大切な人を、定期的に想う時間\"<\u002Fem>そのものです。\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"features__grid\">\n      <div class=\"features__val reveal\">\n        <div class=\"features__val-media ph\">\n          <span class=\"features__val-num\">i<\u002Fspan>\n          <span class=\"features__val-cap\">Sender's Lens<\u002Fspan>\n          <div class=\"ph__label\">\n            <span class=\"ph__tag\">Image 07<\u002Fspan>\n            <span class=\"ph__desc\">スマホのカレンダーに記された記念日と、傍らに置かれた花の写真<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"features__val-body-wrap\">\n          <h3 class=\"features__val-title\">送り手の視点で<br>設計されている<\u002Fh3>\n          <p class=\"features__val-body\">思い出す負担、手配の手間、忘れる不安。それらをすべて取り除くために、送り手の視点で設計しています。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"features__val reveal reveal-d1\">\n        <div class=\"features__val-media ph\">\n          <span class=\"features__val-num\">ii<\u002Fspan>\n          <span class=\"features__val-cap\">From the Field<\u002Fspan>\n          <div class=\"ph__label\">\n            <span class=\"ph__tag\">Image 08<\u002Fspan>\n            <span class=\"ph__desc\">朝露に濡れた花畑、束ねられたばかりの旬の花<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"features__val-body-wrap\">\n          <h3 class=\"features__val-title\">産地直送・<br>季節の花<\u002Fh3>\n          <p class=\"features__val-body\">近くの生産地から、新鮮な花を直送。適正な価格で、品質にも妥協しません。安心してお任せいただけます。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"features__val reveal reveal-d2\">\n        <div class=\"features__val-media ph\">\n          <span class=\"features__val-num\">iii<\u002Fspan>\n          <span class=\"features__val-cap\">Twice a Year<\u002Fspan>\n          <div class=\"ph__label\">\n            <span class=\"ph__tag\">Image 09<\u002Fspan>\n            <span class=\"ph__desc\">静かな部屋に置かれた一輪挿し、窓から差し込む柔らかな光<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"features__val-body-wrap\">\n          <h3 class=\"features__val-title\">押し付けない<br>頻度<\u002Fh3>\n          <p class=\"features__val-body\">年に2回という、ちょうど良い頻度。多すぎず、少なすぎず。\"特別\"を、特別のままにします。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SCENES ============ -->\n<section id=\"scenes\" class=\"section scenes\">\n  <div class=\"container\">\n    <div class=\"scenes__head reveal\">\n      <div class=\"eyebrow-num\">— 06 / Use Cases<\u002Fdiv>\n      <h2 class=\"section-hl\" style=\"margin-top:1.5rem;\">\n        彼女の誕生日、結婚記念日、母の日。<br>\n        <em>Altruが代わりに覚えています。<\u002Fem>\n      <\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"scenes__grid\">\n      <div class=\"scenes__card reveal\">\n        <div class=\"scenes__img ph\">\n          <span class=\"scenes__img-num\">i.<\u002Fspan>\n          <div class=\"ph__label\"><span class=\"ph__tag\">Scene 01<\u002Fspan><span class=\"ph__desc\">夜のホテル室内、ベッドサイドのスマホを見る男性のシルエット<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <h3 class=\"scenes__title\">出張先のホテルで<\u002Fh3>\n        <p class=\"scenes__body\">夜遅く、ホテルでスマホを開く。「明日、お花が届きます」というAltruからの通知。自分は今、東京にいない。でも、明日の朝、あの人の手元には花が届く。少しだけ、肩の力が抜ける。<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"scenes__card reveal reveal-d1\">\n        <div class=\"scenes__img ph\">\n          <span class=\"scenes__img-num\">ii.<\u002Fspan>\n          <div class=\"ph__label\"><span class=\"ph__tag\">Scene 02<\u002Fspan><span class=\"ph__desc\">玄関で笑顔の妻と、帰宅した夫の後ろ姿。あたたかな室内光<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <h3 class=\"scenes__title\">帰宅したら玄関で<\u002Fh3>\n        <p class=\"scenes__body\">「今日、お花届いたよ」玄関で笑う妻の顔を見て、思い出す。ああ、そうだった。今日は結婚記念日だった。忘れていた自分を、Altruが救ってくれた。<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"scenes__card reveal reveal-d2\">\n        <div class=\"scenes__img ph\">\n          <span class=\"scenes__img-num\">iii.<\u002Fspan>\n          <div class=\"ph__label\"><span class=\"ph__tag\">Scene 03<\u002Fspan><span class=\"ph__desc\">スマホの画面に映る、母から届いた花の写真とメッセージ<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <h3 class=\"scenes__title\">LINEで届いた一枚の写真<\u002Fh3>\n        <p class=\"scenes__body\">実家の母から、花の写真と短いメッセージ。「ありがとう。きれいね」電話するきっかけは、いつもなかなか掴めない。花は、その入り口になってくれる。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"scenes__cta-row reveal\">\n      <a href=\"#cta\" class=\"btn btn--primary\">\n        <span>先行登録リストに加わる<\u002Fspan>\n        <span class=\"arrow\">→<\u002Fspan>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ VOICE ============ -->\n<section class=\"section voice\">\n  <div class=\"container--mid\">\n    <div class=\"voice__grid\">\n      <div class=\"reveal\">\n        <div class=\"eyebrow-num\" style=\"margin-bottom:1.5rem;\">— 07 / Voice<\u002Fdiv>\n        <h2 class=\"voice__hl\">\n          花は、その瞬間ではなく、<br>\n          <em>その後ずっと効く。<\u002Fem>\n        <\u002Fh2>\n        <p class=\"voice__intro\">\n          予期せず花が届いた日、女性の多くは、その日のことを長く覚えています。ある調査では、パートナーから花を贈られた女性の8割が「数週間〜数ヶ月、その出来事を思い出していた」と答えています。\n        <\u002Fp>\n        <p class=\"voice__pull\">\n          花そのものが特別なのではありません。<br>\n          <strong>「自分のことを、忙しい中で思い出してくれた」という事実<\u002Fstrong>が、特別なのです。\n        <\u002Fp>\n      <\u002Fdiv>\n      <div class=\"voice__quotes\">\n        <div class=\"voice__quote reveal reveal-d1\">\n          <p class=\"voice__qtext\">彼が花を贈ってくれたのは、付き合って5年で初めてでした。花瓶に飾るたびに、その日のことを思い出します。<\u002Fp>\n          <p class=\"voice__qsrc\">30代女性<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"voice__quote reveal reveal-d2\">\n          <p class=\"voice__qtext\">夫から、何でもない日に届いた花。SNSにあげたくなる気持ちが、初めて分かりました。<\u002Fp>\n          <p class=\"voice__qsrc\">40代女性<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ PRICE ============ -->\n<section id=\"price\" class=\"section price\">\n  <div class=\"container--mid\">\n    <div class=\"price__head reveal\">\n      <div class=\"eyebrow-num\">— 08 / Plan<\u002Fdiv>\n      <h2 class=\"section-hl\" style=\"margin-top:1.5rem;\">\n        あなたのペースで、<br><em>想いを届ける。<\u002Fem>\n      <\u002Fh2>\n      <p class=\"about__lede\">4つのプランから、ライフスタイルに合った頻度を選べます。<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"price__tabs reveal\">\n      <button class=\"price__tab\" data-plan=\"monthly\" onclick=\"switchPlan('monthly')\">\n        <span class=\"tab-name\">月額<\u002Fspan>\n        <span class=\"tab-freq\">monthly<\u002Fspan>\n      <\u002Fbutton>\n      <button class=\"price__tab\" data-plan=\"seasonal\" onclick=\"switchPlan('seasonal')\">\n        <span class=\"tab-name\">季節<\u002Fspan>\n        <span class=\"tab-freq\">3ヶ月に1回<\u002Fspan>\n      <\u002Fbutton>\n      <button class=\"price__tab active\" data-plan=\"halfyear\" onclick=\"switchPlan('halfyear')\">\n        <span class=\"tab-name\">半年<\u002Fspan>\n        <span class=\"tab-freq\">half-yearly<\u002Fspan>\n      <\u002Fbutton>\n      <button class=\"price__tab\" data-plan=\"anniversary\" onclick=\"switchPlan('anniversary')\">\n        <span class=\"tab-name\">記念日<\u002Fspan>\n        <span class=\"tab-freq\">1年に1度<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"price__panels\">\n      <div class=\"price__panel\" id=\"plan-monthly\">\n        <div class=\"price__card\">\n          <div class=\"price__badge\">— Monthly —<\u002Fdiv>\n          <h3 class=\"price__name\">Altru Monthly<\u002Fh3>\n          <p class=\"price__tagline\">想うを、毎月に。<\u002Fp>\n          <p class=\"price__freq\">毎月お届け・年12回<\u002Fp>\n          <div class=\"price__nums\">\n            <div><p class=\"price__num-label\">1回あたり<\u002Fp><p class=\"price__amount\">¥5,000<\u002Fp><p class=\"price__amount-note\">税込・送料込<\u002Fp><\u002Fdiv>\n            <div><p class=\"price__num-label\">年間<\u002Fp><p class=\"price__amount\">¥60,000<\u002Fp><p class=\"price__amount-note\">年12回お届け<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n          <ul class=\"price__features\">\n            <li class=\"price__feature\"><span class=\"check\">✦<\u002Fspan><span>メッセージカード込み<\u002Fspan><\u002Fli>\n            <li class=\"price__feature\"><span class=\"check\">✦<\u002Fspan><span>LINEで届け先・日程を管理<\u002Fspan><\u002Fli>\n            <li class=\"price__feature\"><span class=\"check\">✦<\u002Fspan><span>季節のフローリスト厳選ブーケ<\u002Fspan><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div>\n          <p class=\"price__context\">毎月、あの人の日常に<br>花がある生活。<\u002Fp>\n          <p class=\"price__note\">「特別な日」を待たなくていい。日常そのものを、少しだけ特別にするプランです。<\u002Fp>\n          <div class=\"hairline hairline--gold hairline--short\" style=\"margin-bottom:1.5rem;\"><\u002Fdiv>\n          <p class=\"price__small\">1日あたり約167円。コーヒー一杯より安く、関係を温め続けることができます。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"price__panel\" id=\"plan-seasonal\">\n        <div class=\"price__card\">\n          <div class=\"price__badge\">— Seasonal —<\u002Fdiv>\n          <h3 class=\"price__name\">Altru Seasonal<\u002Fh3>\n          <p class=\"price__tagline\">季節を、届ける。<\u002Fp>\n          <p class=\"price__freq\">3ヶ月毎・年4回お届け<\u002Fp>\n          <div class=\"price__nums\">\n            <div><p class=\"price__num-label\">1回あたり<\u002Fp><p class=\"price__amount\">¥6,000<\u002Fp><p class=\"price__amount-note\">税込・送料込<\u002Fp><\u002Fdiv>\n            <div><p class=\"price__num-label\">年間<\u002Fp><p class=\"price__amount\">¥24,000<\u002Fp><p class=\"price__amount-note\">年4回お届け<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n          <ul class=\"price__features\">\n            <li class=\"price__feature\"><span class=\"check\">✦<\u002Fspan><span>メッセージカード込み<\u002Fspan><\u002Fli>\n            <li class=\"price__feature\"><span class=\"check\">✦<\u002Fspan><span>LINEで届け先・日程を管理<\u002Fspan><\u002Fli>\n            <li class=\"price__feature\"><span class=\"check\">✦<\u002Fspan><span>旬の花をフローリストが厳選<\u002Fspan><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div>\n          <p class=\"price__context\">春夏秋冬、それぞれの<br>季節の花を届ける。<\u002Fp>\n          <p class=\"price__note\">3ヶ月に一度という、ちょうどいい頻度。季節の移ろいを、花と一緒に感じてもらえます。<\u002Fp>\n          <div class=\"hairline hairline--gold hairline--short\" style=\"margin-bottom:1.5rem;\"><\u002Fdiv>\n          <p class=\"price__small\">月割にすると約2,000円。日常の中に、季節を感じる豊かさを。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"price__panel active\" id=\"plan-halfyear\">\n        <div class=\"price__card price__card--featured\">\n          <div class=\"price__badge\">— Half Year —<\u002Fdiv>\n          <h3 class=\"price__name\">Altru Half Year<\u002Fh3>\n          <p class=\"price__tagline\">想うを、届ける。<\u002Fp>\n          <p class=\"price__freq\">6ヶ月毎・年2回お届け<\u002Fp>\n          <div class=\"price__nums\">\n            <div><p class=\"price__num-label\">1回あたり<\u002Fp><p class=\"price__amount\">¥8,000<\u002Fp><p class=\"price__amount-note\">税込・送料込<\u002Fp><\u002Fdiv>\n            <div><p class=\"price__num-label\">年間<\u002Fp><p class=\"price__amount\">¥16,000<\u002Fp><p class=\"price__amount-note\">年2回お届け<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n          <ul class=\"price__features\">\n            <li class=\"price__feature\"><span class=\"check\">✦<\u002Fspan><span>メッセージカード込み<\u002Fspan><\u002Fli>\n            <li class=\"price__feature\"><span class=\"check\">✦<\u002Fspan><span>LINEで届け先・日程を管理<\u002Fspan><\u002Fli>\n            <li class=\"price__feature\"><span class=\"check\">✦<\u002Fspan><span>季節のフローリスト厳選ブーケ<\u002Fspan><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div>\n          <p class=\"price__context\">半年に一度でいい。<br>大切にできる男でいる。<\u002Fp>\n          <p class=\"price__note\">迷う時間も、贈り忘れの罪悪感も、これでなくなります。まず試すなら、このプランから。<\u002Fp>\n          <div class=\"hairline hairline--gold hairline--short\" style=\"margin-bottom:1.5rem;\"><\u002Fdiv>\n          <p class=\"price__small\">最も多くの方に選ばれているプランです。年2回という\"特別感\"を保ちながら、確実に想いを届けます。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"price__panel\" id=\"plan-anniversary\">\n        <div class=\"price__card\">\n          <div class=\"price__badge\">— Anniversary —<\u002Fdiv>\n          <h3 class=\"price__name\">Altru Anniversary<\u002Fh3>\n          <p class=\"price__tagline\">大切な日に、花を。<\u002Fp>\n          <p class=\"price__freq\">年1回・記念日にお届け<\u002Fp>\n          <div class=\"price__nums\">\n            <div><p class=\"price__num-label\">1回あたり<\u002Fp><p class=\"price__amount\">¥12,000<\u002Fp><p class=\"price__amount-note\">税込・送料込<\u002Fp><\u002Fdiv>\n            <div><p class=\"price__num-label\">年間<\u002Fp><p class=\"price__amount\">¥12,000<\u002Fp><p class=\"price__amount-note\">年1回お届け<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n          <ul class=\"price__features\">\n            <li class=\"price__feature\"><span class=\"check\">✦<\u002Fspan><span>プレミアムメッセージカード込み<\u002Fspan><\u002Fli>\n            <li class=\"price__feature\"><span class=\"check\">✦<\u002Fspan><span>LINEで届け先・日程を管理<\u002Fspan><\u002Fli>\n            <li class=\"price__feature\"><span class=\"check\">✦<\u002Fspan><span>特別日向けのプレミアムブーケ<\u002Fspan><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div>\n          <p class=\"price__context\">一年に一度だからこそ、<br>絶対に忘れたくない日に。<\u002Fp>\n          <p class=\"price__note\">結婚記念日、誕生日、母の日。年に一度の大切な日だけ、確実に届けたい方のためのプランです。<\u002Fp>\n          <div class=\"hairline hairline--gold hairline--short\" style=\"margin-bottom:1.5rem;\"><\u002Fdiv>\n          <p class=\"price__small\">4プランの中で最もボリュームのあるプレミアムブーケをお届けします。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SEASONS ============ -->\n<section id=\"seasons\" class=\"seasons\">\n  <div class=\"container\">\n    <div class=\"seasons__head reveal\">\           <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"season-card reveal reveal-d3\">\n        <div class=\"season-visual\">\n          <svg viewBox=\"0 0 200 250\" xmlns=\"http://www.w3.org/2000/svg\" preserveAspectRatio=\"xMidYMid slice\">\n            <rect width=\"200\" height=\"250\" fill=\"#16170e\"><\u002Frect>\n            <circle cx=\"50\" cy=\"60\" r=\"1.5\" fill=\"#ECE4D2\" opacity=\"0.7\"><\u002Fcircle>\n            <circle cx=\"150\" cy=\"50\" r=\"1\" fill=\"#ECE4D2\" opacity=\"0.6\"><\u002Fcircle>\n            <circle cx=\"120\" cy=\"80\" r=\"1.2\" fill=\"#ECE4D2\" opacity=\"0.55\"><\u002Fcircle>\n            <circle cx=\"80\" cy=\"100\" r=\"1\" fill=\"#ECE4D2\" opacity=\"0.6\"><\u002Fcircle>\n            <ellipse cx=\"100\" cy=\"180\" rx=\"40\" ry=\"50\" fill=\"#B8AE99\" opacity=\"0.55\"><\u002Fellipse>\n            <ellipse cx=\"100\" cy=\"170\" rx=\"28\" ry=\"35\" fill=\"#ECE4D2\" opacity=\"0.7\"><\u002Fellipse>\n            <circle cx=\"100\" cy=\"165\" r=\"12\" fill=\"#C9A45A\" opacity=\"0.55\"><\u002Fcircle>\n            <ellipse cx=\"75\" cy=\"190\" rx=\"18\" ry=\"22\" fill=\"#B8AE99\" opacity=\"0.55\"><\u002Fellipse>\n            <ellipse cx=\"125\" cy=\"195\" rx=\"20\" ry=\"24\" fill=\"#C9A45A\" opacity=\"0.4\"><\u002Fellipse>\n            <path d=\"M 50 210 L 60 230 M 145 220 L 155 235\" stroke=\"#5a6048\" stroke-width=\"1.5\" opacity=\"0.7\"><\u002Fpath>\n            <path d=\"M 70 215 Q 65 225 70 235\" stroke=\"#5a6048\" stroke-width=\"1.2\" fill=\"none\" opacity=\"0.6\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"season-content\">\n          <div class=\"season-jp\">冬 — ふゆ<\u002Fdiv>\n          <div class=\"season-name\">Winter<\u002Fdiv>\n          <div class=\"season-flowers\">\n            アネモネ / ラナンキュラス<br>\n            白椿 / ヒヤシンス / 雲竜柳\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ PRESS ============ -->\n<section class=\"press\">\n  <div class=\"container\">\n    <div class=\"press__label\">— As Featured In —<\u002Fdiv>\n    <div class=\"press__logos\">\n      <div class=\"press__logo\">CASA<br>BRUTUS<\u002Fdiv>\n      <div class=\"press__logo press__logo--italic\">Discover Japan<\u002Fdiv>\n      <div class=\"press__logo\">POPEYE<\u002Fdiv>\n      <div class=\"press__logo press__logo--italic\">&amp;Premium<\u002Fdiv>\n      <div class=\"press__logo\">BRUTUS<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ STORY ============ -->\n<section class=\"section story\">\n  <div class=\"container--mid\">\n    <div class=\"story__grid\">\n      <div class=\"story__visual reveal\">\n        <div class=\"ph story__visual-inner\">\n          <div class=\"ph__label\">\n            <span class=\"ph__tag\">Our Story<\u002Fspan>\n            <span class=\"ph__desc\">机に向かい、メッセージカードを書く男性の手元。背景に小さな花。<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"eyebrow-num reveal\" style=\"margin-bottom:1.5rem;\">— 09 / Our Story<\u002Fdiv>\n        <h2 class=\"section-hl reveal reveal-d1\" style=\"margin-bottom:2.5rem;\">\n          なぜ、私たちは<br>このサービスを<em>作ったのか。<\u002Fem>\n        <\u002Fh2>\n        <div class=\"story__body reveal reveal-d2\">\n          <p>Altruという名前は、<em>Altruism（利他）<\u002Fem>から来ています。<\u002Fp>\n          <p>日本の男性は、優しさを言葉にすることが、得意ではないかもしれません。照れくさいから。仕事が忙しいから。タイミングが分からないから。でも、その奥に、たしかに思いやりはある。<\u002Fp>\n          <p>私たちは、その<strong>\"言葉にしない優しさ\"<\u002Fstrong>を、形にする手伝いをしたいと思いました。毎日、誰かを想う時間を、ほんの少しだけ仕組みに変える。それが、Altruの考える\"利他\"のかたちです。<\u002Fp>\n          <p>花は、そのための小さな装置にすぎません。私たちが本当に届けたいのは、あなたが大切な人を想った、<strong>その時間そのもの<\u002Fstrong>です。<\u002Fp>\n          <p class=\"story__sig\">— Altru Team<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FAQ ============ -->\n<section id=\"faq\" class=\"section faq\">\n  <div class=\"container--narrow\">\n    <div class=\"faq__head reveal\">\n      <div class=\"eyebrow-num\">— 10 / FAQ<\u002Fdiv>\n      <h2 class=\"section-hl\" style=\"margin-top:1.5rem;\">よくあるご質問<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"faq__list\">\n      <details class=\"faq__item reveal\">\n        <summary class=\"faq__summary\">\n          <span class=\"faq__q\"><span class=\"faq__qnum\">Q1.<\u002Fspan><span>花の好みが分からなくても大丈夫ですか？<\u002Fspan><\u002Fspan>\n          <span class=\"faq__icon\"><\u002Fspan>\n        <\u002Fsummary>\n        <p class=\"faq__a\">はい、大丈夫です。Altruでは季節ごとにフローリストが厳選した花束をお届けするため、相手の好みを細かく聞き出す必要はありません。色味や雰囲気のリクエストがあれば、登録時にお伝えいただけます。<\u002Fp>\n      <\u002Fdetails>\n      <details class=\"faq__item reveal\">\n        <summary class=\"faq__summary\">\n          <span class=\"faq__q\"><span class=\"faq__qnum\">Q2.<\u002Fspan><span>届け先が変わったらどうすればいいですか？<\u002Fspan><\u002Fspan>\n          <span class=\"faq__icon\"><\u002Fspan>\n        <\u002Fsummary>\n        <p class=\"faq__a\">LINEからいつでも変更可能です。引っ越しや帰省先への一時的な変更も、次回お届けの数日前まで受け付けています。<\u002Fp>\n      <\u002Fdetails>\n      <details class=\"faq__item reveal\">\n        <summary class=\"faq__summary\">\n          <span class=\"faq__q\"><span class=\"faq__qnum\">Q3.<\u002Fspan><span>いつから始まりますか？<\u002Fspan><\u002Fspan>\n          <span class=\"faq__icon\"><\u002Fspan>\n        <\u002Fsummary>\n        <p class=\"faq__a\">現在、サービスの正式開始に向けて準備中です。先行登録いただいた方には、開始時に最優先でご案内し、初回特別ギフトをお届けします。<\u002Fp>\n      <\u002Fdetails>\n      <details class=\"faq__item reveal\">\n        <summary class=\"faq__summary\">\n          <span class=\"faq__q\"><span class=\"faq__qnum\">Q4.<\u002Fspan><span>途中でやめることはできますか？<\u002Fspan><\u002Fspan>\n          <span class=\"faq__icon\"><\u002Fspan>\n        <\u002Fsummary>\n        <p class=\"faq__a\">はい、いつでも解約可能です。違約金や複雑な手続きはありません。LINEからボタン一つで完了します。<\u002Fp>\n      <\u002Fdetails>\n      <details class=\"faq__item reveal\">\n        <summary class=\"faq__summary\">\n          <span class=\"faq__q\"><span class=\"faq__qnum\">Q5.<\u002Fspan><span>相手にバレずに送ることはできますか？<\u002Fspan><\u002Fspan>\n          <span class=\"faq__icon\"><\u002Fspan>\n        <\u002Fsummary>\n        <p class=\"faq__a\">可能です。発送元の表記や、サプライズ用のお届け方法もご相談いただけます。<\u002Fp>\n      <\u002Fdetails>\n      <details class=\"faq__item reveal\">\n        <summary class=\"faq__summary\">\n          <span class=\"faq__q\"><span class=\"faq__qnum\">Q6.<\u002Fspan><span>メッセージカードは毎回書かないといけませんか？<\u002Fspan><\u002Fspan>\n          <span class=\"faq__icon\"><\u002Fspan>\n        <\u002Fsummary>\n        <p class=\"faq__a\">いいえ。デフォルトのメッセージもご用意していますので、忙しい時はそのままでも構いません。ただ、できれば一行でも、あなたの言葉を添えていただくことをおすすめしています。<\u002Fp>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ CTA ============ -->\n<section id=\"cta\" class=\"section cta-section\">\n  <div class=\"container--narrow cta-section__inner\">\n    <div class=\"eyebrow-num reveal\" style=\"margin-bottom:1.5rem;\">— 11 / Join us<\u002Fdiv>\n    <h2 class=\"cta-section__hl reveal reveal-d1\">\n      先行登録者には、<br><em>初回特別ギフト<\u002Fem>をご用意。\n    <\u002Fh2>\n    <p class=\"cta-section__lede reveal reveal-d2\">\n      Altruは、まもなくサービスを開始します。先行登録いただいた方には、サービス開始時の最優先案内と、初回お届け時の特別ギフトをご用意しています。\n    <\u002Fp>\n    <div class=\"cta-section__social reveal reveal-d2\">\n      <span class=\"cta-section__dot\"><\u002Fspan>\n      <span>現在 <strong class=\"cta-section__count\" id=\"registrationCount\">328<\u002Fstrong> 名が登録済み・残り <strong class=\"cta-section__count\" id=\"remainingCount\">172<\u002Fstrong> 名<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"cta-box reveal reveal-d3\" id=\"ctaBox\">\n      <div id=\"ctaForm\">\n        <div class=\"cta-box__row\">\n          <input type=\"email\" id=\"emailInput\" placeholder=\"メールアドレスを入力\" class=\"cta-box__input\">\n          <button class=\"cta-box__submit\" onclick=\"handleEmailSubmit()\">先行登録する →<\u002Fbutton>\n        <\u002Fdiv>\n        <p class=\"cta-box__fine\" id=\"emailError\" style=\"color:#c0392b;display:none;\">メールアドレスを正しく入力してください。<\u002Fp>\n        <div class=\"cta-box__divider\">\n          <div class=\"cta-box__divider-line\"><\u002Fdiv>\n          <span class=\"cta-box__divider-text\">— or —<\u002Fspan>\n          <div class=\"cta-box__divider-line\"><\u002Fdiv>\n        <\u002Fdiv>\n        <button class=\"cta-box__line\" onclick=\"handleLineSubmit()\">LINEで登録する<\u002Fbutton>\n        <p class=\"cta-box__fine\">いつでも登録解除できます。勧誘メールは送りません。<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"cta-success\" id=\"ctaSuccess\">\n        <div class=\"cta-success__icon\">✓<\u002Fdiv>\n        <p class=\"cta-success__title\">先行登録が完了しました<\u002Fp>\n        <p class=\"cta-success__body\">サービス開始時に最優先でご案内します。<br>初回特別ギフトを楽しみにお待ちください。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"cta-section__fine reveal\">© 2026 Altru. All Rights Reserved.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FOOTER ============ -->\n<footer class=\"footer\">\n  <div class=\"container footer__inner\">\n    <div class=\"footer__brand-block\">\n      <p class=\"logo footer__brand\">Altru<\u002Fp>\n      <p class=\"footer__tag\">花の定期便ではなく、<br>忙しくても、大切な人を大切にできる男のための定期便。<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"footer__meta\">\n      <span class=\"footer__motto\">— A habit of care —<\u002Fspan>\n      <span>© 2026 Altru, Tokyo<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<div id=\"altru-tweaks-root\" style=\"display:none\"><\u002Fdiv>\n\n<div class=\"sticky-cta\" id=\"stickyCta\">\n  <p class=\"sticky-cta__text\">先行登録で初回特別ギフト<\u002Fp>\n  <button class=\"sticky-cta__btn\" onclick=\"window.location.href='#cta'\">登録する →<\u002Fbutton>\n<\u002Fdiv>\n\n<script>\n/* NAV scroll state */\nconst nav = document.getElementById('nav');\nwindow.addEventListener('scroll', () => {\n  nav.classList.toggle('scrolled', window.scrollY > 40);\n}, { passive: true });\n\n/* MOBILE NAV */\nconst burger = document.getElementById('burger');\nconst mobileMenu = document.getElementById('mobileMenu');\nburger.addEventListener('click', () => {\n  burger.classList.toggle('open');\n  mobileMenu.classList.toggle('open');\n});\nfunction closeMobileMenu(){ burger.classList.remove('open'); mobileMenu.classList.remove('open'); }\n\n/* REVEAL */\nconst obs = new IntersectionObserver((es)=> {\n  es.forEach(e => { if(e.isIntersecting){ e.target.classList.add('in'); obs.unobserve(e.target);} });\n}, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });\ndocument.querySelectorAll('.reveal, .line-anim').forEach(el => obs.observe(el));\n\n/* Above-the-fold: ensure hero is visible immediately */\nrequestAnimationFrame(() => {\n  document.querySelectorAll('.hero .reveal, .hero .line-anim').forEach(el => {\n    el.classList.add('in');\n    obs.unobserve(el);\n  });\n});\n\n/* KOAN lines staggered */\nconst lineObs = new IntersectionObserver((es)=>{\n  es.forEach(entry => {\n    if (entry.isIntersecting){\n      const lines = entry.target.querySelectorAll('.koan__line');\n      lines.forEach((l, i)=> setTimeout(()=> l.classList.add('in'), i*220));\n      lineObs.unobserve(entry.target);\n    }\n  });\n}, { threshold: 0.2 });\nconst koanLines = document.querySelector('.koan__lines');\nif (koanLines) lineObs.observe(koanLines);\n\n/* COUNTERS */\nfunction animateCounter(el, target, duration=1600){\n  const isLarge = target >= 1000;\n  const start = performance.now();\n  function step(now){\n    const p = Math.min((now-start)/duration, 1);\n    const e = 1 - Math.pow(1-p, 3);\n    const v = Math.round(e*target);\n    el.textContent = isLarge ? v.toLocaleString() : v;\n    if (p < 1) requestAnimationFrame(step);\n  }\n  requestAnimationFrame(step);\n}\nconst counterObs = new IntersectionObserver((es)=>{\n  es.forEach(e=>{\n    if(e.isIntersecting){ animateCounter(e.target, parseInt(e.target.dataset.target,10)); counterObs.unobserve(e.target); }\n  });\n}, { threshold: 0.5 });\ndocument.querySelectorAll('.counter').forEach(el => counterObs.observe(el));\n\n/* MANIFESTO kinetic word lighting */\nconst manifestoLines = [\n  \"大切な人を、大切にできる男でいる。\",\n  \"その姿勢を、花というかたちで届けています。\"\n];\nconst manifestoEl = document.getElementById('manifestoBig');\nif (manifestoEl){\n  const lineHtml = manifestoLines.map(line => {\n    const chunks = line.split(/(、|。)/).filter(Boolean);\n    return chunks.map(c => {\n      if (c === '、' || c === '。') return c;\n      const cls = (c.includes('大切にできる男') || c.includes('花というかたち')) ? 'word gold' : 'word';\n      return `<span class=\"${cls}\">${c}<\u002Fspan>`;\n    }).join('');\n  }).join('<br><br>');\n  manifestoEl.innerHTML = lineHtml;\n}\nconst wordObs = new IntersectionObserver((es)=>{\n  es.forEach(e=>{\n    if(e.isIntersecting){\n      const words = e.target.querySelectorAll('.word');\n      words.forEach((w, i)=> setTimeout(()=> w.classList.add('lit'), i*180));\n      wordObs.unobserve(e.target);\n    }\n  });\n}, { threshold: 0.4 });\nif (manifestoEl) wordObs.observe(manifestoEl);\n\n/* PRICE TABS */\nfunction switchPlan(plan){\n  document.querySelectorAll('.price__tab').forEach(t => t.classList.remove('active'));\n  document.querySelectorAll('.price__panel').forEach(p => p.classList.remove('active'));\n  document.querySelector(`[data-plan=\"${plan}\"]`).classList.add('active');\n  document.getElementById(`plan-${plan}`).classList.add('active');\n}\n\n/* STICKY CTA */\nconst stickyCta = document.getElementById('stickyCta');\nconst heroSection = document.getElementById('top');\nconst ctaSection = document.getElementById('cta');\nconst sObs = new IntersectionObserver((es)=>{\n  es.forEach(e=>{\n    if (!e.isIntersecting && e.target === heroSection) stickyCta.classList.add('visible');\n    if (e.isIntersecting && e.target === ctaSection) stickyCta.classList.remove('visible');\n  });\n}, { threshold: 0.1 });\nsObs.observe(heroSection); sObs.observe(ctaSection);\n\n/* CTA FORM */\nfunction handleEmailSubmit(){\n  const input = document.getElementById('emailInput');\n  const err = document.getElementById('emailError');\n  const valid = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(input.value.trim());\n  if(!valid){ err.style.display='block'; input.style.borderColor='#c0392b'; return; }\n  err.style.display='none'; showSuccess();\n}\nfunction handleLineSubmit(){ showSuccess(); }\nfunction showSuccess(){\n  document.getElementById('ctaForm').style.display='none';\n  document.getElementById('ctaSuccess').style.display='flex';\n  const c = document.getElementById('registrationCount');\n  const r = document.getElementById('remainingCount');\n  if (c) c.textContent='329'; if (r) r.textContent='171';\n}\n\n/* PARALLAX hero bg mark */\nconst bgMark = document.querySelector('.hero__bg-mark');\nif (bgMark){\n  window.addEventListener('scroll', ()=>{\n    const y = window.scrollY;\n    bgMark.style.transform = `translate(-50%, calc(-50% + ${y*0.18}px))`;\n  }, { passive: true });\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
